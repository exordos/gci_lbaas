name: build

on:
  push:
  workflow_dispatch:

env:
  ARTIFACTS_PATH: artifacts
  PROJECT_NAME: exordos-lbaas
  REPO_ENDPOINT_PUT: http://10.20.0.1:8082

jobs:
  Build:
    runs-on: self-hosted
    strategy:
      fail-fast: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 30
      - name: Build Exordos LBaaS
        run: |
          set -eux

          # Build in all image formats
          export GEN_IMG_FORMAT=qcow2,zst
          
          exordos build $(pwd)

          # Temporary upload step is done in the build script
          VERSION="$(exordos --silent get-version .)"

          # Upload the VM images
          cd output
          curl -X PUT --upload-file exordos-lbaas.qcow2 \
            ${REPO_ENDPOINT_PUT}/${PROJECT_NAME}/${VERSION}/exordos-lbaas.qcow2
          curl -X PUT --upload-file exordos-lbaas.raw.zst \
            ${REPO_ENDPOINT_PUT}/${PROJECT_NAME}/${VERSION}/exordos-lbaas.raw.zst

          sha256sum exordos-lbaas.qcow2 >> SHA256SUMS
          sha256sum exordos-lbaas.raw.zst >> SHA256SUMS

          curl -X PUT --upload-file SHA256SUMS \
            ${REPO_ENDPOINT_PUT}/${PROJECT_NAME}/${VERSION}/SHA256SUMS

          if [[ $GITHUB_REF == refs/tags/* ]]; then
            curl -X PUT --upload-file exordos-lbaas.qcow2 \
              ${REPO_ENDPOINT_PUT}/${PROJECT_NAME}/latest/exordos-lbaas.qcow2
            curl -X PUT --upload-file exordos-lbaas.raw.zst \
              ${REPO_ENDPOINT_PUT}/${PROJECT_NAME}/latest/exordos-lbaas.raw.zst
            curl -X PUT --upload-file SHA256SUMS \
              ${REPO_ENDPOINT_PUT}/${PROJECT_NAME}/latest/SHA256SUMS
          fi

          cd -
      - name: Set current date as env variable
        id: date
        run: |
          r=$(date -u +'%Y.%m.%d')
          echo "DATE=$r" >> $GITHUB_OUTPUT
      - name: Publish image (for tags only)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./output/*.zst
          tag: ${{ github.ref }}
          release_name: ${{ steps.date.outputs.DATE }} (${{ github.ref_name }})
          overwrite: true
          file_glob: true
